name: E2E

# ADR-0016 §2: the E2E leg runs the full compose stack incl. the genuine Keycloak
# PKCE round-trip. It gates merges to main and is available on demand — NOT on every
# branch push (it is heavy: it builds images and starts 7 services).
# Docs-only / non-code PRs skip the heavy stack (ADR-0016 §2 amendment,
# 2026-07-09). paths-ignore kept in sync with ci.yml. workflow_dispatch is
# unfiltered — a manual run is always allowed.
on:
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'docs/**'
      - 'ACMP product context/**'
      - '.claude/**'
  workflow_dispatch:

# Supersede a stale in-flight run of the same PR; separate group from ci.yml.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Force the action-reminder Hangfire sweep to fire every minute in e2e so AC-054/055 can prove a genuine
      # fire on the real stack (R4a). Compose interpolation takes shell env over --env-file, so the worker gets
      # minutely HERE while deploy/.env.example and production keep the daily 0 6 * * * default (docker-compose.yml).
      ACTION_REMINDERS_SWEEP_CRON: '* * * * *'
    defaults:
      run:
        working-directory: src/Acmp.Web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/Acmp.Web/package-lock.json

      # ADR-0032: secrets are file-backed. Materialize deploy/secrets/* from the committed placeholder .env.example
      # before compose (which references those files) parses. No real credentials here — CI values are public.
      - name: Materialize Docker secret files
        working-directory: .
        run: sh deploy/scripts/gen-secrets.sh

      - name: Bring up the self-contained stack
        working-directory: .
        run: docker compose -f deploy/docker-compose.yml --env-file deploy/.env.example up -d --build --wait

      - name: Install web deps
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E (seeds Keycloak users, then drives the real PKCE login)
        env:
          CI: 'true'
        run: |
          set -a; source ../../deploy/.env.example; set +a
          npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/Acmp.Web/playwright-report
          retention-days: 7

      - name: Stack logs on failure
        if: ${{ failure() }}
        working-directory: .
        run: docker compose -f deploy/docker-compose.yml logs --no-color --tail 200

      - name: Tear down the stack
        if: ${{ always() }}
        working-directory: .
        run: docker compose -f deploy/docker-compose.yml --env-file deploy/.env.example down -v
