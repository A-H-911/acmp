name: Security

# P16b / C-SUP-01/02, C-SAST-01, C-SEC-02. Supply-chain + SAST + secret scanning. Scanners land REPORT-ONLY
# (continue-on-error / exit-code 0) so they surface findings on the PR without reding it; each flips to gating
# once its first run is triaged (the .NET dependency gate already blocks in ci.yml). Skips docs-only changes,
# in sync with ci.yml.
on:
  push:
    branches: [ main ]
    paths-ignore: [ '*.md', '**/*.md', 'docs/**', 'ACMP product context/**', '.claude/**' ]
  pull_request:
    branches: [ main ]
    paths-ignore: [ '*.md', '**/*.md', 'docs/**', 'ACMP product context/**', '.claude/**' ]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for gitleaks
      - name: Gitleaks (gating — 153 commits scanned clean, .gitleaks.toml allowlist triaged)
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.21.2 \
            detect --source=/repo --config=/repo/.gitleaks.toml --redact --verbose --exit-code=1

  sast:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep OSS (gating — 2 test-only csharp-sqli findings triaged as FP via nosemgrep)
        run: semgrep scan --config p/csharp --config p/javascript --config p/security-audit --error --severity ERROR

  trivy-fs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Trivy fs + misconfig + secret (gating on CRITICAL,HIGH)
        # Pinned docker image (like the gitleaks step) instead of trivy-action: the composite action pins a
        # transitive setup-trivy@vX tag that upstream retagged/removed, breaking action resolution. The tag is
        # therefore NOT Dependabot-managed — bump aquasec/trivy manually.
        # B4 container hardening fixed the 3 HIGH Dockerfile misconfigs (DS-0002 non-root USER, DS-0029), so the
        # gate is tightened CRITICAL -> CRITICAL,HIGH (D-21 closed). --severity also filters the report.
        run: |
          docker run --rm -v "$PWD:/repo" aquasec/trivy:0.72.0 fs /repo \
            --scanners vuln,misconfig,secret \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1

  trivy-image:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build the API image
        run: docker build -f deploy/Dockerfile.backend --target api -t acmp-api:scan .
      - name: Trivy image scan (report-only — base-OS CVEs are mostly unfixable; W-d lowest-value/highest-cost)
        # Report-only by design: image scans re-find base-image CVEs that only a base bump (Dependabot docker)
        # can fix; gating here would red the build on things this PR can't remediate. Scans the API image (the
        # primary .NET app surface); the web/nginx base is covered by the digest pin + Dependabot.
        continue-on-error: true
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.72.0 image \
            --scanners vuln --severity CRITICAL,HIGH --ignore-unfixed --exit-code 0 acmp-api:scan

  sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: SBOM (CycloneDX, informational — C-SUP-01 / NFR-051)
        uses: anchore/sbom-action@v0.17.8
        with:
          path: .
          format: cyclonedx-json
          artifact-name: acmp-sbom.cyclonedx.json
