name: CI

# Non-code changes (docs, design HTML, agent memory) don't touch build/test —
# skip the whole matrix for them. A mixed code+docs change still runs (GitHub
# skips only when EVERY changed file matches). Kept in sync with e2e.yml.
on:
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'docs/**'
      - 'ACMP product context/**'
      - '.claude/**'
      - 'tamheed-package/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'docs/**'
      - 'ACMP product context/**'
      - '.claude/**'
      - 'tamheed-package/**'

# Supersede stale in-flight PR runs; never cancel a push-to-main run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Restore
        run: dotnet restore acmp.sln
      - name: Format check
        run: dotnet format acmp.sln --verify-no-changes --no-restore
      - name: Build
        run: dotnet build acmp.sln -c Release --no-restore
      - name: Test + coverage
        run: dotnet test acmp.sln -c Release --no-build --collect:"XPlat Code Coverage" --settings coverlet.runsettings
      - name: Coverage gate (ADR-0016 ≥95% lines, global + per-file)
        run: node scripts/check-coverage.mjs .
      - name: Vulnerable packages gate (High/Critical block — C-SUP-02 / OQ-027)
        run: node scripts/check-vulns.mjs

  compose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Self-contained lint (ADR-0015 / CON-001 — no external runtime hosts)
        run: node scripts/check-self-contained.mjs
      - name: Realm export check (roles reach the SPA via the ID token)
        run: node scripts/check-realm-export.mjs
      - name: Validate docker-compose
        run: docker compose -f deploy/docker-compose.yml --env-file deploy/.env.example config -q

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: src/Acmp.Web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/Acmp.Web/package-lock.json
      - name: Install
        run: npm ci
      - name: i18n parity (EN/AR)
        run: node ../../scripts/check-i18n.mjs
      - name: Test + coverage gate (ADR-0016 ≥95% lines, global + per-file)
        run: npm run test:cov
      - name: Build
        run: npm run build
      - name: Audit
        run: npm audit --audit-level=high
