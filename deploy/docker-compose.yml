name: acmp

services:
  sqlserver:
    # Stock SQL Server 2022 + Full-Text Search (global search, FR-143/145). See deploy/Dockerfile.sqlserver.
    # NOTE: switching a running stack from the old stock image forces a SQL container rebuild — recreate on a
    # FRESH volume (`docker compose down -v`) or the mssql-data volume/password state mismatches and the
    # container comes up unhealthy.
    build:
      context: ..
      dockerfile: deploy/Dockerfile.sqlserver
    image: acmp/sqlserver-fts:2022
    # Sidecars get no-new-privileges only (C-CON-003 scopes read-only-FS + cap_drop to the APP containers:
    # api/worker/web). SQL Server needs a writable /var/opt/mssql for its own data/log/tempdb — the
    # documented "writable only where needed" exception — and dropping all caps risks breaking the engine's
    # own startup for no gain on an internal-only service.
    security_opt: ["no-new-privileges:true"]
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -No -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  seq:
    # Pinned by digest (was :latest — unpinned caused the firstRun-password break; OQ-031 digest pinning).
    image: datalust/seq@sha256:868a12e93ec0b8c993767a7dd4cd6c8ebc441511c79e4cfac66c911f62d4db65
    security_opt: ["no-new-privileges:true"]   # sidecar: see the sqlserver note (C-CON-003 scoping)
    environment:
      ACCEPT_EULA: "Y"
      # Recent Seq requires a first-run admin password OR an explicit no-auth opt-out, else it exits on
      # startup. The bundled Seq is internal dev observability (UI on a loopback host port); prod sets
      # SEQ_FIRSTRUN_ADMINPASSWORD instead (docs/domain/deployment.md / P18).
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5341:5341"   # ingestion (Serilog + OTLP) — app uses internal seq:5341, host map is operator-only
      - "8341:80"     # Seq UI (was 8081 — remapped to avoid common host port conflicts)
    volumes:
      - seq-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  minio:
    # Digest-pinned (C-SUP-01, P16b/B2b) — tag kept before @sha256: for Dependabot. e2e pulls + exercises it.
    image: minio/minio:latest@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    security_opt: ["no-new-privileges:true"]   # sidecar: see the sqlserver note (C-CON-003 scoping)
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # Keycloak's own operational store (OQ-038 → option a: dedicated Postgres-for-Keycloak).
  # ACMP *application* data stays SQL-Server-only (ADR-0003); this store holds only Keycloak's
  # realm/users/sessions. Volume `kcdata` is covered by backup/restore (docs/domain/deployment.md, ADR-0015).
  keycloak-db:
    # Digest-pinned (C-SUP-01, P16b/B2b) — tag kept before @sha256: for Dependabot.
    image: postgres:16@sha256:17e67d7b9890c99b055ba1e0d5c5be4ec27c9d3a72bda32db24a5e5d8a85af0c
    security_opt: ["no-new-privileges:true"]   # sidecar: see the sqlserver note (C-CON-003 scoping)
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KC_DB_USER}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - kcdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d keycloak || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # Self-hosted Keycloak (ADR-0015): bundled IdP with the ACMP-owned realm. On first start it
  # imports deploy/keycloak/realm-export.json (realm + OIDC client + 8 roles/groups + initial admin).
  # start-dev is the dev profile; prod hardening (production mode, real hostname, TLS) is a P18 override.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0@sha256:09a381c715ab0b111835b70f2905955274843a219c6f27efb348e4d9f4086858
    security_opt: ["no-new-privileges:true"]   # sidecar: see the sqlserver note (C-CON-003 scoping)
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://keycloak-db:5432/keycloak"
      KC_DB_USERNAME: ${KC_DB_USER}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      # Trust the reverse proxy's X-Forwarded-* so KC emits correct https absolute URLs behind nginx/ngrok.
      KC_PROXY_HEADERS: "xforwarded"
      # Issuer pinned so the SPA (browser) and the API agree byte-for-byte. ngrok-only (PR-C): KC is served
      # same-origin over https under /kc via the web nginx proxy (KEYCLOAK_HOSTNAME=https://acmp.ngrok.dev/kc),
      # eliminating the https-page→http-KC mixed content. Default keeps the localhost profile working.
      KC_HOSTNAME: "${KEYCLOAK_HOSTNAME:-http://keycloak.localhost:8085}"
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    ports:
      - "8085:8080"
    healthcheck:
      # KC 25+ exposes health on the management port 9000; the image has bash but no curl/wget,
      # so probe the readiness endpoint over bash's /dev/tcp. ponytail: standard KC compose probe.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 60s

  # One-shot idempotent realm reconciliation (OQ-041 / CHANGE-004). Keycloak imports the bundled realm
  # ONLY on first run, so committed realm-config changes never reach an existing Keycloak DB volume. This
  # job re-applies the critical client-scope assignments (e.g. `basic` → `sub` in the access token) on every
  # deploy, idempotently and WITHOUT touching users/passwords (unlike a destructive `import --override`).
  # Reuses the keycloak image (bash + kcadm, no curl/jq) — no new runtime dependency (CON-001). Exits 0.
  keycloak-config:
    image: quay.io/keycloak/keycloak:26.0@sha256:09a381c715ab0b111835b70f2905955274843a219c6f27efb348e4d9f4086858
    security_opt: ["no-new-privileges:true"]   # sidecar: see the sqlserver note (C-CON-003 scoping)
    depends_on:
      keycloak:
        condition: service_healthy
    entrypoint: ["bash", "/opt/keycloak/reconcile.sh"]
    environment:
      KC_URL: "http://keycloak:8080"
      ACMP_REALM: "acmp"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
    volumes:
      - ./keycloak/reconcile.sh:/opt/keycloak/reconcile.sh:ro
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
      target: api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      # Encrypt=True (C-CRYPTO-01): the API↔SQL link is TLS, not plaintext. SQL Server auto-generates a
      # self-signed cert at startup, so this needs nothing mounted — verified in-stack (sys.dm_exec_connections
      # encrypt_option: FALSE before, TRUE after). TrustServerCertificate=True stays because that cert is
      # self-signed: the traffic is ENCRYPTED but the server is NOT AUTHENTICATED, so this stops passive
      # sniffing (T-20) and not an active MITM. Authenticating it (TrustServerCertificate=False + a CA cert
      # whose CN/SAN is `sqlserver`) is the operator's P18 step — see deployment.md §3.4.
      ConnectionStrings__Acmp: "Server=sqlserver;Database=Acmp;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;Encrypt=True"
      Minio__Endpoint: "minio:9000"
      Minio__AccessKey: ${MINIO_ROOT_USER}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD}
      Minio__Secure: "false"
      # Browser-reachable host used ONLY to presign recording playback URLs (ADR-0014); via nginx /acmp-recordings/.
      # Empty => presign with the internal client. Set MINIO_PUBLIC_ENDPOINT=acmp.ngrok.dev for the ngrok profile.
      Minio__PublicEndpoint: ${MINIO_PUBLIC_ENDPOINT:-}
      Minio__PublicSecure: "true"
      # Bundled Keycloak realm (ADR-0015). Issuer must match the SPA's exactly; RequireHttpsMetadata
      # is false only for the in-stack http dev profile — set true behind TLS in prod (P18).
      Authentication__Keycloak__Authority: "${KEYCLOAK_AUTHORITY:-http://keycloak.localhost:8085/realms/acmp}"
      Authentication__Keycloak__RequireHttpsMetadata: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://seq:5341/ingest/otlp"
      OTEL_SERVICE_NAME: "acmp-api"
      # Webex adapter (P13, ADR-0005/0024). Default OFF — in-app is the sole channel (AC-071). Fill these via
      # .env to enable; the worker below MUST carry the identical values (same job graph). Secrets never committed.
      Webex__Enabled: "${WEBEX_ENABLED:-false}"
      Webex__BotToken: "${WEBEX_BOT_TOKEN:-}"
      Webex__SpaceId: "${WEBEX_SPACE_ID:-}"
      Webex__WebhookSecret: "${WEBEX_WEBHOOK_SECRET:-}"
      Webex__WebhookPublicUrl: "${WEBEX_WEBHOOK_PUBLIC_URL:-}"
      Webex__AcmpBaseUrl: "${WEBEX_ACMP_BASE_URL:-}"
      Webex__OAuthClientId: "${WEBEX_OAUTH_CLIENT_ID:-}"
      Webex__OAuthClientSecret: "${WEBEX_OAUTH_CLIENT_SECRET:-}"
      Webex__OAuthRedirectUri: "${WEBEX_OAUTH_REDIRECT_URI:-}"
      Webex__TokenEncryptionKey: "${WEBEX_TOKEN_ENCRYPTION_KEY:-}"
      Webex__OAuthSetupKey: "${WEBEX_OAUTH_SETUP_KEY:-}"
      # ASP.NET DataProtection key-ring lands on a writable tmpfs (the root FS is read-only below).
      # Ephemeral is fine: auth is bearer-token, so no protected payload must survive a restart.
      DataProtection__KeysPath: "/keys"
    # Container hardening (C-CON-001/002/003, D-21). Root FS read-only; all Linux capabilities dropped
    # (the app binds 8080 — unprivileged — as non-root UID 1654, so it needs none); no-new-privileges
    # blocks setuid escalation.
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    tmpfs:
      - /keys
    volumes:
      # /tmp is a DISK-backed volume, deliberately NOT a tmpfs. ASP.NET's IFormFile binding spools any
      # multipart section over 64 KB to a temp file in Path.GetTempPath(); a recording upload is capped at
      # 2 GiB (MeetingsEndpoints.RecordingUploadMaxBytes) while this service is budgeted 512 MB-1 GB RAM
      # (deployment.md §9). tmpfs pages count against the container's memory cgroup, so a RAM-backed /tmp
      # would OOM on any real recording upload. nginx's proxy_request_buffering off (default.conf.template)
      # stops the *proxy* spooling the body — it does not stop the *app* spooling it, hence disk here.
      # This is the C-CON-003 "writable only where needed" exception, same as sqlserver's data volume.
      - api-tmp:/tmp
    extra_hosts:
      # Resolve the Keycloak issuer host to the Docker host (where port 8085 is published) so the
      # api validates tokens against the same issuer URL the browser used.
      - "keycloak.localhost:host-gateway"
    depends_on:
      sqlserver:
        condition: service_healthy
      seq:
        condition: service_started
      minio:
        condition: service_started
      keycloak:
        # service_started, not _healthy: JwtBearer fetches OIDC metadata lazily on first request
        # (with retry), so the api need not block boot on Keycloak's slower readiness.
        condition: service_started
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        # SPA OIDC config baked at build time — same issuer the api validates (KEYCLOAK_AUTHORITY)
        # so the browser and api agree byte-for-byte. Public PKCE client, no secret.
        VITE_OIDC_AUTHORITY: "${KEYCLOAK_AUTHORITY:-http://keycloak.localhost:8085/realms/acmp}"
        VITE_OIDC_CLIENT_ID: "acmp-web"
    environment:
      # CSP Keycloak origin, substituted into the nginx template at startup (runtime, no rebuild).
      KEYCLOAK_ORIGIN: "${KEYCLOAK_ORIGIN:-http://keycloak.localhost:8085}"
    # Container hardening (C-CON-001/002/003, D-21). nginx-unprivileged already runs as UID 101 and binds
    # 8080, so no capabilities are needed. Its packaged nginx.conf redirects every writable path into /tmp
    # (pid /tmp/nginx.pid; client_body/proxy/fastcgi/uwsgi/scgi _temp_path all under /tmp) and leaves
    # /var/cache/nginx empty — so /tmp + the envsubst output dir are the only tmpfs mounts needed. (The
    # stock nginx image would also need /var/cache/nginx and /run; this image does not.)
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    tmpfs:
      # 64m is ample: proxy_request_buffering off (/api/) and proxy_buffering off (/acmp-recordings/) keep
      # the 2 GiB recording bodies streaming through rather than landing in client_body_temp — which, on a
      # RAM-backed tmpfs in a 128 MB-budgeted container (deployment.md §9), is exactly what must not happen.
      - /tmp:size=64m
      # nginx envsubst renders /etc/nginx/templates/*.template into this dir at container start, which the
      # read-only root FS forbids. Masking the image's stock conf.d/default.conf is intended — our rendered
      # default.conf replaces it.
      #
      # uid/gid/mode are REQUIRED, not decoration. A bare tmpfs here inherits the image directory's
      # root:root 0755, so nginx (UID 101) cannot write its own rendered config: envsubst fails with
      # "conf.d is not writable", and — because this mount also hides the stock default.conf — nginx then
      # starts with NO server block at all. It reports "ready for start up", forks its workers and shows as
      # `running` while listening on nothing. Verified: with these options the container boots clean and
      # serves every security header; without them it silently serves nothing.
      - /etc/nginx/conf.d:uid=101,gid=101,mode=0755
    depends_on:
      api:
        condition: service_healthy
    ports:
      # nginx-unprivileged listens on 8080 (non-root, C-CON-001); host port 8088 unchanged.
      - "8088:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # Dedicated background-job worker (ADR-0024): runs the Hangfire SERVER that processes the jobs the API
  # enqueues (Webex sends/webhooks/meeting-create + the recurring action-reminder sweep). Shares the SQL DB and
  # Webex config with the API; the API owns EF migrations, so the worker waits for the API to be healthy before
  # its Hangfire schema bootstraps and its recurring job registers.
  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
      target: worker
    environment:
      DOTNET_ENVIRONMENT: Production
      # Encrypt=True — must match the api's connection string exactly (C-CRYPTO-01); see the note there.
      ConnectionStrings__Acmp: "Server=sqlserver;Database=Acmp;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;Encrypt=True"
      Minio__Endpoint: "minio:9000"
      Minio__AccessKey: ${MINIO_ROOT_USER}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD}
      Minio__Secure: "false"
      # Webex config MUST match the API's exactly (same job graph). Fill via .env to enable (default off).
      Webex__Enabled: "${WEBEX_ENABLED:-false}"
      Webex__BotToken: "${WEBEX_BOT_TOKEN:-}"
      Webex__SpaceId: "${WEBEX_SPACE_ID:-}"
      Webex__WebhookSecret: "${WEBEX_WEBHOOK_SECRET:-}"
      Webex__WebhookPublicUrl: "${WEBEX_WEBHOOK_PUBLIC_URL:-}"
      Webex__AcmpBaseUrl: "${WEBEX_ACMP_BASE_URL:-}"
      Webex__OAuthClientId: "${WEBEX_OAUTH_CLIENT_ID:-}"
      Webex__OAuthClientSecret: "${WEBEX_OAUTH_CLIENT_SECRET:-}"
      Webex__OAuthRedirectUri: "${WEBEX_OAUTH_REDIRECT_URI:-}"
      Webex__TokenEncryptionKey: "${WEBEX_TOKEN_ENCRYPTION_KEY:-}"
    # Container hardening (C-CON-001/002/003, D-21). Unlike the api, /tmp can be a RAM-backed tmpfs here:
    # the worker takes no uploads and streams no files to disk (jobs talk to SQL/MinIO/Webex over the
    # network), so nothing large is ever spooled. No DataProtection key-ring either — the worker is a
    # Generic Host with no request pipeline.
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    tmpfs:
      - /tmp
    depends_on:
      sqlserver:
        condition: service_healthy
      seq:
        condition: service_started
      minio:
        condition: service_started
      api:
        condition: service_healthy
    restart: unless-stopped

  # Optional inbound ingress for the Webex recording-ready webhook (P13, ADR-0024). Opt-in: `--profile ngrok`.
  # Tunnels the WHOLE app: nginx (web:80) serves the SPA AND reverse-proxies /api -> api:8080, so the SPA, the
  # webhook (/api/webex/webhook) and the OAuth callback (/api/webex/oauth/callback) all sit on ONE public HTTPS
  # domain. NGROK_URL = your reserved ngrok domain (dev: https://acmp.ngrok.dev, prod: https://acmp.ngrok.app);
  # required when this profile is active. Register that URL + /api/webex/webhook as the Webex webhook targetUrl.
  # ponytail: routing PROD webhook traffic through ngrok's SaaS tunnel is in mild tension with the self-contained
  # posture (CON-001/INV-003) — prefer the org reverse proxy in prod; treat ngrok as dev + an accepted fallback.
  ngrok:
    # NOT digest-pinned (unlike the other images): ngrok is behind `profiles:[ngrok]`, so e2e (default
    # profile) never pulls/exercises it — a pinned bad digest would fail silently. Left tag-pinned. (P16b/B2b)
    image: ngrok/ngrok:latest
    profiles: ["ngrok"]
    security_opt: ["no-new-privileges:true"]   # sidecar: see the sqlserver note (C-CON-003 scoping)
    # web:8080, not web:80 — the C-CON-001 switch to nginx-unprivileged moved the listen port. Because this
    # service is profile-gated, e2e never exercises it, so the stale :80 would have failed only in an
    # operator's ngrok session (P16-B4 fix).
    command: ["http", "web:8080", "--url=${NGROK_URL}"]
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "4040:4040"   # ngrok agent inspection UI (operator-only)

volumes:
  mssql-data:
  seq-data:
  minio-data:
  kcdata:        # self-hosted Keycloak datastore (ADR-0015 / OQ-038); in backup/restore scope
  api-tmp:       # api /tmp under a read-only root FS — disk-backed so 2 GiB upload spooling never hits RAM
                 # (C-CON-003; see the api service note). Scratch only: NOT in backup/restore scope.
