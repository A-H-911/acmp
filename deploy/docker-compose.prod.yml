# ACMP production overlay (P18a Batch 2). ADDITIVE over docker-compose.yml — the base stays the dev/e2e stack.
#
#   deploy/scripts/up.sh --prod        # = docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#
# What this flips (each delta is one the base compose flags as a "P18 override"):
#   - Keycloak: start-dev -> `start` (production mode).
#   - Seq: no-auth dev opt-out -> first-run admin password (auth required).
#   - Host ports: internal services stop publishing to 0.0.0.0; admin consoles bind 127.0.0.1 only (SSH-tunnel /
#     VLAN reachable, never public — deployment.md §2.3). Only `web` faces the network.
#   - api: OIDC metadata over HTTPS enforced (default; ACMP_REQUIRE_HTTPS_METADATA=false only for a local smoke).
#   - Resource limits per deployment.md §9; OCI image labels; SQL /backups bind-mount for the nightly backup (P18b).
#
# OPERATOR inputs (deploy/.env + deploy/env/acmp-api.env, and the runbook): the real KEYCLOAK_* https hostnames, the
# least-priv ACMP_DB_USER=acmp_svc (Batch 3), the Seq admin hash, TLS termination (mount a cert into web OR front
# with the org reverse proxy — CON-001), and the C-CRYPTO Step-B / TDE / SSE steps (deployment.md §3.4).

services:

  sqlserver:
    ports: !override []            # internal only; the app reaches it over the compose network
    volumes:
      # Nightly BACKUP DATABASE target (P18b). Bind-mounted to a host dir so deploy/scripts/backup.sh can copy the
      # .bak off-box (a named volume is not reachable by host scp/rsync). Kept OUT of the read-only exception set.
      - ${ACMP_BACKUP_DIR:-/opt/acmp/backups}:/backups
    deploy:
      resources:
        limits: { cpus: "4", memory: 4G }
        reservations: { cpus: "2", memory: 2G }

  keycloak-db:
    deploy:
      resources:
        limits: { cpus: "1", memory: 512M }

  keycloak:
    # Production mode (auto-build on first start). The base entrypoint shim (ADR-0032) still supplies the secrets;
    # only the kc.sh args change. Runs HTTP behind the web nginx (KC_HTTP_ENABLED + KC_PROXY_HEADERS stay from base);
    # the operator sets KEYCLOAK_HOSTNAME to the real https URL in deploy/.env.
    command: !override ["start", "--import-realm"]
    ports: !override []            # the web nginx proxies /kc/ — no direct host exposure
    deploy:
      resources:
        limits: { cpus: "2", memory: 1G }

  minio:
    ports: !override ["127.0.0.1:9001:9001"]   # console: localhost only (SSH tunnel); S3 API is network-internal
    deploy:
      resources:
        limits: { cpus: "1", memory: 512M }

  seq:
    ports: !override ["127.0.0.1:8341:80"]     # UI: localhost only; ingestion (5341) is network-internal
    environment:
      # Auth required in prod: disable the dev no-auth opt-out and set the first-run admin password hash.
      # SEQ_FIRSTRUN_ADMINPASSWORDHASH is a Seq-generated PBKDF2 hash (not a plaintext secret) — operator supplies it.
      SEQ_FIRSTRUN_NOAUTHENTICATION: "false"
      SEQ_FIRSTRUN_ADMINPASSWORDHASH: "${SEQ_FIRSTRUN_ADMINPASSWORDHASH:?set SEQ_FIRSTRUN_ADMINPASSWORDHASH for prod}"
    deploy:
      resources:
        limits: { cpus: "1", memory: 512M }

  api:
    build:
      args:
        IMAGE_VERSION: "${IMAGE_VERSION:-dev}"
        IMAGE_REVISION: "${IMAGE_REVISION:-unknown}"
        IMAGE_CREATED: "${IMAGE_CREATED:-unknown}"
    ports: !override []            # nginx proxies /api/ — no direct host exposure
    environment:
      # OIDC metadata must be fetched over HTTPS in prod (the authority is https behind TLS). Overridable to false
      # ONLY for a local overlay smoke against http Keycloak.
      Authentication__Keycloak__RequireHttpsMetadata: "${ACMP_REQUIRE_HTTPS_METADATA:-true}"
      # Least-priv runtime (ADR-0031): the app connects as acmp_svc (no DDL). The db-migrate one-shot ran migrations
      # + pre-provisioned the Hangfire schema, so the runtime host neither migrates nor prepares schema.
      Database__MigrateOnStartup: "false"
      Hangfire__PrepareSchema: "false"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits: { cpus: "4", memory: 1G }
        reservations: { cpus: "2", memory: 512M }

  worker:
    build:
      args:
        IMAGE_VERSION: "${IMAGE_VERSION:-dev}"
        IMAGE_REVISION: "${IMAGE_REVISION:-unknown}"
        IMAGE_CREATED: "${IMAGE_CREATED:-unknown}"
    environment:
      Hangfire__PrepareSchema: "false"   # least-priv acmp_svc: schema pre-provisioned by db-migrate (ADR-0031)
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits: { cpus: "2", memory: 512M }

  # One-shot: provision the least-priv runtime login `acmp_svc` as `sa`, before migrations (ADR-0031). Reuses the
  # SQL image (sqlcmd) + the mounted sqlserver-init.sh. Idempotent; exits 0.
  sqlserver-init:
    image: acmp/sqlserver-fts:2022
    build:
      context: ..
      dockerfile: deploy/Dockerfile.sqlserver
    entrypoint: ["bash", "/opt/init/sqlserver-init.sh"]
    environment:
      ACMP_DB_NAME: "${ACMP_DB_NAME:-Acmp}"
      ACMP_DB_SERVER: "sqlserver"
    volumes:
      - ./scripts/sqlserver-init.sh:/opt/init/sqlserver-init.sh:ro
    secrets:
      - mssql_sa_password
      - acmp_svc_password
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: "no"

  # One-shot: run EF migrations + install the Hangfire schema as a PRIVILEGED principal (the migrator connection
  # string = sa), so the least-priv runtime never issues DDL. `--migrate-only` migrates then exits 0 (ADR-0031/0032).
  db-migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
      target: api
    command: ["--migrate-only"]
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Minimal config for the composition root to build (migrations only touch DbContexts; MinioFileStore is lazy).
      Minio__Endpoint: "minio:9000"
      Minio__AccessKey: ${MINIO_ROOT_USER}
      Authentication__Keycloak__Authority: "${KEYCLOAK_AUTHORITY:-http://keycloak.localhost:8085/realms/acmp}"
      Authentication__Keycloak__RequireHttpsMetadata: "false"
    secrets:
      # Mount the migrator (sa) connection string AS ConnectionStrings__Acmp so AddKeyPerFile binds it.
      - source: ConnectionStrings__AcmpMigrator
        target: ConnectionStrings__Acmp
    depends_on:
      sqlserver:
        condition: service_healthy
      sqlserver-init:
        condition: service_completed_successfully
    restart: "no"

  web:
    build:
      args:
        IMAGE_VERSION: "${IMAGE_VERSION:-dev}"
        IMAGE_REVISION: "${IMAGE_REVISION:-unknown}"
        IMAGE_CREATED: "${IMAGE_CREATED:-unknown}"
    # TLS: the default here keeps nginx on HTTP:80 for the "front with the org reverse proxy" topology (CON-001,
    # the base ngrok comment's prod recommendation). For self-terminated TLS, mount a cert into deploy/nginx/certs
    # and add the 443 listener per deploy/runbooks/install.md — kept out of the committed overlay so a cert-less
    # fresh-VM boot still works (deployment.md §3.4: certs are an operator obligation).
    ports: !override ["80:8080"]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 128M }

# Prod-only Docker secrets (merged with the base secrets block): the least-priv acmp_svc password (sqlserver-init
# CREATE LOGIN) and the sa-based migrator connection string (db-migrate --migrate-only). ADR-0031/0032.
secrets:
  acmp_svc_password:
    file: ./secrets/acmp_svc_password
  ConnectionStrings__AcmpMigrator:
    file: ./secrets/ConnectionStrings__AcmpMigrator
